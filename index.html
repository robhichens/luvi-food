// ── HELPERS ────────────────────────────────────────────────────────────────
function tokenMatch(a, b) {
  const at = a.split(/[\s\/]+/), bt = b.split(/[\s\/]+/);
  return at.some(t => t.length > 3 && bt.some(u => u.includes(t) || t.includes(u)));
}

function scoreRecipe(recipe, pantry) {
  const onHand = Object.entries(pantry).filter(([,v])=>v).map(([k])=>k.toLowerCase());
  const recipeIngs = recipe.ing.map(i => i.toLowerCase());
  const matched = recipeIngs.filter(ri => onHand.some(p => p.includes(ri) || ri.includes(p) || tokenMatch(ri,p)));
  const missing = recipeIngs.filter(ri => !onHand.some(p => p.includes(ri) || ri.includes(p) || tokenMatch(ri,p)));
  const score = recipeIngs.length > 0 ? Math.round((matched.length/recipeIngs.length)*100) : 0;
  return { ...recipe, score, matchedCount:matched.length, missing };
}

function matchRecipes(pantry, mealType, allRecipes) {
  return allRecipes
    .filter(r => r.type === mealType)
    .map(r => scoreRecipe(r, pantry))
    .sort((a,b) => b.score - a.score);
}

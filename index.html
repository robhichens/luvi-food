// ── HELPERS ────────────────────────────────────────────────────────────────
function load(key, def) { try { const v=localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function tokenMatch(a, b) {
  const at = a.split(/[\s\/]+/), bt = b.split(/[\s\/]+/);
  return at.some(t => t.length > 3 && bt.some(u => u.includes(t) || t.includes(u)));
}

function scoreRecipe(recipe, pantry) {
  const onHand = Object.entries(pantry).filter(([,v])=>v).map(([k])=>k.toLowerCase());
  const recipeIngs = recipe.ing.map(i => i.toLowerCase());
  const matched = recipeIngs.filter(ri => onHand.some(p => p.includes(ri) || ri.includes(p) || tokenMatch(ri,p)));
  const missing = recipeIngs.filter(ri => !onHand.some(p => p.includes(ri) || ri.includes(p) || tokenMatch(ri,p)));
  const score = recipeIngs.length > 0 ? Math.round((matched.length/recipeIngs.length)*100) : 0;
  return { ...recipe, score, matchedCount:matched.length, missing };
}

function matchRecipes(pantry, mealType, allRecipes) {
  return allRecipes
    .filter(r => r.type === mealType)
    .map(r => scoreRecipe(r, pantry))
    .sort((a,b) => b.score - a.score);
}

function filterByFamily(recipes, family) {
  if (!family || (!family.dietaryPrefs?.length && !family.allergies?.length)) return recipes;
  return recipes.filter(r => {
    const ingStr = r.ing.join(' ').toLowerCase();
    const allergy = family.allergies || [];
    const prefs = family.dietaryPrefs || [];
    if (allergy.includes('Peanuts') && (ingStr.includes('peanut'))) return false;
    if (allergy.includes('Tree Nuts') && (ingStr.includes('almond') || ingStr.includes('walnut') || ingStr.includes('cashew') || ingStr.includes('pecan'))) return false;
    if (allergy.includes('Milk / Dairy') && (ingStr.includes('milk') || ingStr.includes('butter') || ingStr.includes('cheese') || ingStr.includes('cream') || ingStr.includes('yogurt'))) return false;
    if (allergy.includes('Eggs') && ingStr.includes('egg')) return false;
    if (allergy.includes('Wheat / Gluten') && (ingStr.includes('flour') || ingStr.includes('bread') || ingStr.includes('pasta') || ingStr.includes('tortilla') || ingStr.includes('cracker') || ingStr.includes('oat'))) return false;
    if (allergy.includes('Fish') && (ingStr.includes('salmon') || ingStr.includes('tuna') || ingStr.includes('fish'))) return false;
    if (prefs.includes('Vegetarian') && (ingStr.includes('beef') || ingStr.includes('bacon') || ingStr.includes('ham') || ingStr.includes('turkey') || ingStr.includes('sausage') || ingStr.includes('pork') || ingStr.includes('chicken') || ingStr.includes('shrimp') || ingStr.includes('salmon') || ingStr.includes('tuna'))) return false;
    if (prefs.includes('Vegan') && (ingStr.includes('beef') || ingStr.includes('chicken') || ingStr.includes('egg') || ingStr.includes('milk') || ingStr.includes('butter') || ingStr.includes('cheese') || ingStr.includes('cream') || ingStr.includes('yogurt') || ingStr.includes('honey') || ingStr.includes('bacon') || ingStr.includes('ham'))) return false;
    if (prefs.includes('Gluten-Free') && (ingStr.includes('flour') || ingStr.includes('bread') || ingStr.includes('pasta') || ingStr.includes('tortilla') || ingStr.includes('cracker'))) return false;
    if (prefs.includes('Dairy-Free') && (ingStr.includes('milk') || ingStr.includes('butter') || ingStr.includes('cheese') || ingStr.includes('cream') || ingStr.includes('yogurt') || ingStr.includes('sour cream'))) return false;
    if (prefs.includes('Nut-Free') && (ingStr.includes('peanut') || ingStr.includes('almond') || ingStr.includes('walnut') || ingStr.includes('nut'))) return false;
    return true;
  });
}

function getIngCategory(ing) {
  const il = ing.toLowerCase();
  for (const cat of MASTER_INGREDIENTS) {
    if (cat.items.some(i => i.toLowerCase() === il || il.includes(i.toLowerCase()) || i.toLowerCase().includes(il))) return cat.category;
  }
  return 'Other';
}

function addMissingToShopping(recipe, shoppingList, setShoppingList) {
  if (!recipe.missing || recipe.missing.length === 0) return;
  setShoppingList(sl => {
    const updated = { ...sl };
    recipe.missing.forEach(ing => {
      const key = ing;
      if (updated[key]) {
        const sources = updated[key].from || [];
        if (!sources.includes(recipe.name)) updated[key] = { ...updated[key], from:[...sources, recipe.name] };
      } else {
        updated[key] = { checked:false, from:[recipe.name] };
      }
    });
    return updated;
  });
}

// ── PANTRY ─────────────────────────────────────────────────────────────────
function PantryScreen({ pantry, setPantry, customPantryItems, setCustomPantryItems }) {
  const [search, setSearch]       = useState('');
  const [expanded, setExpanded]   = useState(() => MASTER_INGREDIENTS.reduce((a,c)=>({...a,[c.category]:true}),{}));
  const [newItemText, setNewItemText] = useState({}); // { [category]: string }

  const toggle = (item) => setPantry(p=>({...p,[item]:!p[item]}));
  const toggleCat = (cat) => setExpanded(e=>({...e,[cat]:!e[cat]}));

  const allItemsForCat = (cat) => [
    ...cat.items,
    ...(customPantryItems[cat.category] || []),
  ];

  const checkCat = (cat) => setPantry(p=>{ const n={...p}; allItemsForCat(cat).forEach(i=>n[i]=true); return n; });
  const uncheckCat = (cat) => setPantry(p=>{ const n={...p}; allItemsForCat(cat).forEach(i=>n[i]=false); return n; });

  const addCustomItem = (category) => {
    const val = (newItemText[category] || '').trim();
    if (!val) return;
    // Don't add duplicates
    const existing = allItemsForCat(MASTER_INGREDIENTS.find(c=>c.category===category));
    if (existing.some(i => i.toLowerCase() === val.toLowerCase())) {
      setNewItemText(t=>({...t,[category]:''}));
      return;
    }
    setCustomPantryItems(ci => ({ ...ci, [category]: [...(ci[category]||[]), val] }));
    setPantry(p => ({ ...p, [val]: true })); // auto-check when added
    setNewItemText(t=>({...t,[category]:''}));
  };

  const removeCustomItem = (category, item) => {
    setCustomPantryItems(ci => ({ ...ci, [category]: (ci[category]||[]).filter(i=>i!==item) }));
    setPantry(p=>{ const n={...p}; delete n[item]; return n; });
  };

  const totalCustom = Object.values(customPantryItems).reduce((a,c)=>a+c.length,0);
  const checkedCount = Object.values(pantry).filter(Boolean).length;
  const totalBase = MASTER_INGREDIENTS.reduce((a,c)=>a+c.items.length,0);
  const total = totalBase + totalCustom;

  const filtered = useMemo(() => {
    if (!search.trim()) return MASTER_INGREDIENTS;
    const q = search.toLowerCase();
    return MASTER_INGREDIENTS
      .map(cat => ({
        ...cat,
        items: [
          ...cat.items.filter(i=>i.toLowerCase().includes(q)),
          ...(customPantryItems[cat.category]||[]).filter(i=>i.toLowerCase().includes(q)),
        ]
      }))
      .filter(cat => cat.items.length > 0);
  }, [search, customPantryItems]);

  return (
    <div className="screen" style={{ padding:'24px 20px' }}>
      <div style={{ fontSize:24, fontWeight:900, color:C.brown, marginBottom:4 }}>My Pantry 🛒</div>
      <div style={{ fontSize:13, color:C.muted, marginBottom:16, lineHeight:1.5 }}>Check off everything you have at home right now.</div>

      <div style={{ background:`linear-gradient(135deg,${C.orange},${C.orangeDark})`, borderRadius:16, padding:'14px 18px', marginBottom:16, display:'flex', alignItems:'center', justifyContent:'space-between', color:C.white }}>
        <div>
          <span style={{ fontSize:26, fontWeight:900 }}>{checkedCount}</span>
          <span style={{ fontSize:14, opacity:0.9, marginLeft:6 }}>/ {total} checked</span>
          {totalCustom > 0 && <span style={{ fontSize:12, opacity:0.75, marginLeft:6 }}>({totalCustom} custom)</span>}
        </div>
        {checkedCount > 0 && <button onClick={()=>setPantry({})} style={{ background:'rgba(255,255,255,0.2)', border:'none', color:C.white, borderRadius:10, padding:'6px 14px', cursor:'pointer', fontSize:12, fontWeight:600 }}>Clear all</button>}
      </div>

      <div style={{ position:'relative', marginBottom:16 }}>
        <span style={{ position:'absolute', left:13, top:'50%', transform:'translateY(-50%)', fontSize:16, pointerEvents:'none' }}>🔍</span>
        <input style={{ ...INPUT, paddingLeft:40 }} placeholder="Search ingredients..." value={search} onChange={e=>setSearch(e.target.value)} />
      </div>

      {filtered.map(masterCat => {
        const cat = MASTER_INGREDIENTS.find(c=>c.category===masterCat.category) || masterCat;
        const customItems = customPantryItems[cat.category] || [];
        const allItems = search.trim() ? masterCat.items : [...cat.items, ...customItems];
        const catChecked = allItems.filter(i=>pantry[i]).length;
        const open = expanded[cat.category];
        const inputVal = newItemText[cat.category] || '';

        return (
          <div key={cat.category} style={{ background:C.white, borderRadius:16, marginBottom:10, boxShadow:'0 2px 8px rgba(0,0,0,0.06)', overflow:'hidden' }}>
            {/* Category header */}
            <div onClick={()=>toggleCat(cat.category)} style={{ display:'flex', alignItems:'center', padding:'13px 17px', cursor:'pointer', userSelect:'none' }}>
              <span style={{ fontSize:20, marginRight:10 }}>{cat.emoji}</span>
              <span style={{ fontWeight:700, fontSize:14, flex:1, color:C.brown }}>{cat.category}</span>
              {catChecked > 0 && <span style={{ background:C.orangeLight, color:C.orangeDark, fontSize:12, fontWeight:700, padding:'2px 10px', borderRadius:10, marginRight:8 }}>{catChecked}/{allItems.length}</span>}
              <span style={{ color:C.muted, fontSize:18, transition:'transform 0.2s', transform:open?'rotate(90deg)':'rotate(0)', display:'inline-block' }}>›</span>
            </div>

            {open && (
              <div style={{ padding:'0 17px 14px', borderTop:`1px solid ${C.border}` }}>
                {/* Built-in items */}
                <div style={{ paddingTop:10, display:'grid', gridTemplateColumns:'1fr 1fr', gap:'2px 6px' }}>
                  {(search.trim() ? masterCat.items.filter(i=>cat.items.includes(i)) : cat.items).map(item => (
                    <Check key={item} small checked={!!pantry[item]} onChange={()=>toggle(item)} label={item} />
                  ))}
                </div>

                {/* Custom items for this category */}
                {customItems.length > 0 && (
                  <div style={{ marginTop:8, paddingTop:8, borderTop:`1px dashed ${C.border}` }}>
                    {customItems.map(item => (
                      <div key={item} style={{ display:'flex', alignItems:'center', gap:4 }}>
                        <div style={{ flex:1 }}>
                          <Check small checked={!!pantry[item]} onChange={()=>toggle(item)} label={item} />
                        </div>
                        <button onClick={()=>removeCustomItem(cat.category, item)} style={{ background:'none', border:'none', cursor:'pointer', color:C.border, fontSize:16, lineHeight:1, padding:'0 2px', flexShrink:0 }}
                          onMouseEnter={e=>e.currentTarget.style.color=C.red}
                          onMouseLeave={e=>e.currentTarget.style.color=C.border}>×</button>
                      </div>
                    ))}
                  </div>
                )}

                {/* Add custom item input */}
                <div style={{ marginTop:12, display:'flex', gap:6 }}>
                  <input
                    style={{ ...INPUT, flex:1, fontSize:13, padding:'8px 12px' }}
                    placeholder={`Add to ${cat.category}...`}
                    value={inputVal}
                    onChange={e=>setNewItemText(t=>({...t,[cat.category]:e.target.value}))}
                    onKeyDown={e=>e.key==='Enter'&&addCustomItem(cat.category)}
                  />
                  <button
                    onClick={()=>addCustomItem(cat.category)}
                    style={{ background:C.orange, color:C.white, border:'none', borderRadius:10, padding:'0 14px', cursor:'pointer', fontWeight:900, fontSize:18, flexShrink:0 }}>+</button>
                </div>

                {/* Check / Uncheck all */}
                <div style={{ marginTop:8, display:'flex', gap:8 }}>
                  {catChecked < allItems.length && <button onClick={()=>checkCat(cat)} style={{ background:'none', border:`1px solid ${C.border}`, borderRadius:8, padding:'5px 12px', fontSize:12, color:C.muted, cursor:'pointer' }}>Check all</button>}
                  {catChecked > 0 && <button onClick={()=>uncheckCat(cat)} style={{ background:'none', border:`1px solid ${C.border}`, borderRadius:8, padding:'5px 12px', fontSize:12, color:C.muted, cursor:'pointer' }}>Uncheck all</button>}
                </div>
              </div>
            )}
          </div>
        );
      })}
      <div style={{ height:20 }} />
    </div>
  );
}

        {[{ icon:'⏱', val:r.time, label:'Time' },{ icon:'🍽', val:`${servings} srv`, label:'Servings' },{ icon:'✅', val:`${r.score}%`, label:'Match' }].map(s => (
          <div key={s.label} style={{ background:C.white, borderRadius:14, padding:'12px 6px', textAlign:'center', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize:20 }}>{s.icon}</div>
            <div style={{ fontWeight:800, fontSize:15, color:C.orange, marginTop:2 }}>{s.val}</div>

          </div>
        ))}
      </div>
      <SCard>
        <STitle>🛒 Ingredients</STitle>
        {r.ing.map((ing,i) => {
          const have = Object.entries(pantry).filter(([,v])=>v).some(([k]) => { const kl=k.toLowerCase(),il=ing.toLowerCase(); return kl.includes(il)||il.includes(kl)||tokenMatch(il,kl); });
          return (
            <div key={ing} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0', borderBottom:i<r.ing.length-1?`1px solid ${C.border}`:'none' }}>
              <span style={{ fontSize:17 }}>{have ? '✅' : '❌'}</span>
              <span style={{ fontSize:14, flex:1, color:have?C.text:C.muted, textDecoration:have?'none':'line-through' }}>{ing}</span>
              {!have && <span style={{ fontSize:11, background:C.redLight, color:C.red, padding:'2px 8px', borderRadius:8, flexShrink:0 }}>Need to buy</span>}
            </div>
          );

          {added ? '✅ Added to Shopping List!' : `🛍 Add ${r.missing.length} missing item${r.missing.length!==1?'s':''} to Shopping List`}

      {/* Method steps */}
      {METHODS[r.id] && (
        <SCard>
          <STitle>👩‍🍳 How to Make It</STitle>
          {METHODS[r.id].map((step, i) => (
            <div key={i} style={{ display:'flex', gap:12, padding:'10px 0', borderBottom: i < METHODS[r.id].length - 1 ? `1px solid ${C.border}` : 'none' }}>

        <div style={{ background:C.orangeLight, borderRadius:16, padding:16, display:'flex', gap:10 }}>
          <span style={{ fontSize:20, flexShrink:0 }}>💡</span>
          <div><div style={{ fontWeight:700, fontSize:14, color:C.brown, marginBottom:3 }}>Chef's Tip</div><div style={{ fontSize:14, color:C.brown, lineHeight:1.6 }}>{r.tip}</div></div>
        </div>
      )}
      <div style={{ height:24 }} />
    </div>
  );
}

              <div style={{ fontSize:13, fontWeight:600, color:C.brown }}>🥗 Family Filter</div>
              <div style={{ fontSize:12, color:C.muted, marginTop:1 }}>
                {[...(family.dietaryPrefs||[]),...(family.allergies||[])].slice(0,2).join(', ')}{(family.dietaryPrefs||[]).length+(family.allergies||[]).length>2?' + more':''}
              </div>
            </div>
            <div onClick={()=>setFilterActive(!filterActive)} style={{ width:48, height:28, borderRadius:14, background:filterActive?C.green:C.border, padding:'4px', display:'flex', alignItems:'center', justifyContent:filterActive?'flex-end':'flex-start', cursor:'pointer', transition:'all 0.25s', flexShrink:0 }}>
              <div style={{ width:20, height:20, borderRadius:10, background:C.white, boxShadow:'0 1px 4px rgba(0,0,0,0.25)', transition:'all 0.25s' }} />
            </div>
          </div>
        )}
      </SCard>

      {/* Results */}
      {checkedCount === 0 ? (
        <EmptyState emoji="🛒" title="Pantry is empty" body="Head to the Pantry tab and check off what you have at home." />
      ) : canMake.length === 0 && almost.length === 0 ? (
        <EmptyState emoji="😕" title="No matches found" body="Try checking more pantry items, or switch meal type." />
      ) : (
        <>
          {canMake.length > 0 && (
            <div style={{ marginBottom:16 }}>
              <div style={{ background:C.greenLight, borderRadius:10, padding:'6px 14px', display:'inline-block', marginBottom:12 }}>
                <span style={{ fontSize:13, fontWeight:700, color:'#065F46' }}>✅ You can make these now ({canMake.length})</span>
              </div>
              {canMake.map(r => <RCard key={r.id} recipe={r} servings={servings} onSelect={()=>onSelectRecipe(r,servings)} />)}
            </div>
          )}
          {almost.length > 0 && (
            <div style={{ marginBottom:16 }}>
              <div style={{ background:C.amberLight, borderRadius:10, padding:'6px 14px', display:'inline-block', marginBottom:12 }}>
                <span style={{ fontSize:13, fontWeight:700, color:'#92400E' }}>🛍 A few items short ({almost.length})</span>
              </div>
              {almost.map(r => <RCard key={r.id} recipe={r} servings={servings} onSelect={()=>onSelectRecipe(r,servings)} />)}
            </div>
          )}
        </>
      )}
      <div style={{ height:20 }} />
    </div>
  );
}

function RCard({ recipe, servings, onSelect }) {
  return (
    <div className="tap" onClick={onSelect} style={{ background:C.white, borderRadius:16, padding:'13px 15px', marginBottom:10, cursor:'pointer', boxShadow:'0 2px 8px rgba(0,0,0,0.06)', borderLeft:`4px solid ${recipe.score>=75?C.green:recipe.score>=50?C.amber:C.red}` }}>
      <div style={{ display:'flex', alignItems:'flex-start', gap:11, marginBottom:5 }}>
        <span style={{ fontSize:30, flexShrink:0 }}>{recipe.emoji}</span>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:2 }}>
            <span style={{ fontWeight:700, fontSize:14, color:C.brown }}>{recipe.name}</span>
            <ScoreBadge score={recipe.score} />
          </div>
          <div style={{ fontSize:12, color:C.muted }}>⏱ {recipe.time} · 🍽 {servings} serving{servings!==1?'s':''}</div>
        </div>
      </div>
      <div style={{ fontSize:13, color:C.muted, lineHeight:1.5, marginBottom:recipe.missing?.length>0?5:0 }}>{recipe.desc}</div>
      {recipe.missing?.length > 0 && <div style={{ fontSize:12, color:C.red }}>Missing: {recipe.missing.slice(0,3).join(', ')}{recipe.missing.length>3?` +${recipe.missing.length-3} more`:''}</div>}
    </div>
  );
}

// ── PLAN SCREEN (Meal Planner + Shopping List) ─────────────────────────────
function PlanScreen({ mealPlan, setMealPlan, pantry, family, allRecipes, shoppingList, setShoppingList }) {
  const [subTab, setSubTab] = useState('planner');
  const [pickerSlot, setPickerSlot] = useState(null); // { day, slotType }

  const assignRecipe = (recipe) => {
    if (!pickerSlot) return;
    setMealPlan(p => ({ ...p, [pickerSlot.day]:{ ...(p[pickerSlot.day]||{}), [pickerSlot.slotType]:recipe } }));
    setPickerSlot(null);
  };

  const clearSlot = (day, slotType) => {
    setMealPlan(p => { const n={...p}; if(n[day]) { n[day]={...n[day]}; delete n[day][slotType]; } return n; });
  };

  const generateShoppingList = () => {
    const missing = {};
    DAYS.forEach(day => {
      MEAL_SLOT_TYPES.forEach(slot => {
        const r = mealPlan[day]?.[slot.id];
        if (!r) return;
        const scored = scoreRecipe(r, pantry);
        (scored.missing || []).forEach(ing => {
          if (!missing[ing]) missing[ing] = { checked:false, from:[] };
          if (!missing[ing].from.includes(r.name)) missing[ing].from.push(r.name);
        });
      });
    });
    setShoppingList(sl => {
      const updated = { ...sl };
      Object.entries(missing).forEach(([k,v]) => {
        if (updated[k]) {
          const existing = updated[k].from || [];
          v.from.forEach(src => { if (!existing.includes(src)) existing.push(src); });
          updated[k] = { ...updated[k], from:existing };
        } else {
          updated[k] = v;
        }
      });
      return updated;
    });
    setSubTab('shopping');
  };

  const plannedCount = DAYS.reduce((a,day) => a + MEAL_SLOT_TYPES.filter(s=>mealPlan[day]?.[s.id]).length, 0);

  return (
    <div className="screen" style={{ padding:'24px 20px' }}>
      <div style={{ fontSize:24, fontWeight:900, color:C.brown, marginBottom:4 }}>Plan & Shop 📅</div>
      <div style={{ fontSize:13, color:C.muted, marginBottom:18, lineHeight:1.5 }}>Plan your week, then build your shopping list automatically.</div>

      {/* Sub-tab switcher */}
      <div style={{ display:'flex', gap:8, background:C.white, borderRadius:14, padding:4, marginBottom:20, boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
        {[{ id:'planner', label:'📅 Week Plan' },{ id:'shopping', label:`🛍 Shopping List${Object.keys(shoppingList).length>0?' ('+Object.keys(shoppingList).length+')':''}` }].map(t => (
          <button key={t.id} onClick={()=>setSubTab(t.id)} style={{ flex:1, padding:'10px 8px', borderRadius:11, border:'none', cursor:'pointer', fontWeight:subTab===t.id?700:500, fontSize:13, background:subTab===t.id?C.orange:C.white, color:subTab===t.id?C.white:C.muted, transition:'all 0.18s' }}>{t.label}</button>
        ))}
      </div>

      {subTab === 'planner' && (
        <>
          {DAYS.map(day => {
            const dayPlan = mealPlan[day] || {};
            const hasAny = MEAL_SLOT_TYPES.some(s => dayPlan[s.id]);
            return (
              <SCard key={day} style={{ padding:'14px 16px', marginBottom:10 }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
                  <div style={{ fontWeight:800, fontSize:15, color:C.brown }}>{day}</div>
                  {hasAny && <div style={{ fontSize:11, color:C.muted }}>{MEAL_SLOT_TYPES.filter(s=>dayPlan[s.id]).length} meal{MEAL_SLOT_TYPES.filter(s=>dayPlan[s.id]).length!==1?'s':''} planned</div>}
                </div>
                {MEAL_SLOT_TYPES.map(slot => {
                  const recipe = dayPlan[slot.id];
                  return (
                    <div key={slot.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:`1px solid ${C.border}` }}>
                      <span style={{ fontSize:16, flexShrink:0 }}>{slot.emoji}</span>
                      <span style={{ fontSize:12, color:C.muted, width:62, flexShrink:0 }}>{slot.label}</span>
                      {recipe ? (
                        <>
                          <span style={{ fontSize:14, fontWeight:600, color:C.text, flex:1 }}>{recipe.emoji} {recipe.name}</span>
                          <button onClick={()=>clearSlot(day,slot.id)} style={{ background:'none', border:'none', cursor:'pointer', color:C.red, fontSize:16, padding:'0 4px', flexShrink:0 }}>×</button>
                        </>
                      ) : (
                        <>
                          <span style={{ flex:1, fontSize:13, color:C.border }}>— not planned</span>
                          <button onClick={()=>setPickerSlot({day,slotType:slot.id})} style={{ background:C.orangeLight, border:'none', borderRadius:8, padding:'5px 12px', cursor:'pointer', fontSize:12, color:C.orangeDark, fontWeight:700, flexShrink:0 }}>+ Add</button>
                        </>
                      )}
                    </div>
                  );
                })}
              </SCard>
            );
          })}
          {plannedCount > 0 && (
            <button onClick={generateShoppingList} className="tap" style={{ width:'100%', padding:'15px 20px', borderRadius:16, border:'none', cursor:'pointer', fontWeight:700, fontSize:15, background:C.green, color:C.white, boxShadow:`0 4px 16px ${C.green}50`, marginTop:8 }}>
              🛍 Generate Shopping List ({plannedCount} meal{plannedCount!==1?'s':''} planned)
            </button>
          )}
          <div style={{ height:24 }} />
        </>
      )}

      {subTab === 'shopping' && (
        <ShoppingListView shoppingList={shoppingList} setShoppingList={setShoppingList} pantry={pantry} setPantry={() => {}} />
      )}

      {/* Meal Picker sheet */}
      <BottomSheet open={!!pickerSlot} onClose={()=>setPickerSlot(null)} title={`Pick a ${pickerSlot ? MEAL_SLOT_TYPES.find(s=>s.id===pickerSlot.slotType)?.label : ''}`}>
        {pickerSlot && (
          <MealPicker
            mealType={pickerSlot.slotType}
            pantry={pantry}
            allRecipes={allRecipes}
            family={family}
            onSelect={assignRecipe} />
        )}
      </BottomSheet>
    </div>
  );
}

function MealPicker({ mealType, pantry, allRecipes, family, onSelect }) {
  const [search, setSearch] = useState('');
  const results = useMemo(() => matchRecipes(pantry, mealType, allRecipes), [pantry, mealType, allRecipes]);
  const filtered = search ? results.filter(r => r.name.toLowerCase().includes(search.toLowerCase())) : results;

  return (
    <div>
      <input style={{ ...INPUT, marginBottom:12 }} placeholder="Search meals..." value={search} onChange={e=>setSearch(e.target.value)} />
      {filtered.length === 0 && <div style={{ textAlign:'center', padding:24, color:C.muted }}>No meals found for "{search}"</div>}
      {filtered.map(r => (
        <div key={r.id} className="tap" onClick={()=>onSelect(r)} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 14px', borderRadius:14, background:C.cream, marginBottom:8, cursor:'pointer' }}>
          <span style={{ fontSize:26 }}>{r.emoji}</span>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, fontSize:14, color:C.brown }}>{r.name}</div>
            <div style={{ fontSize:12, color:C.muted }}>⏱ {r.time}</div>
          </div>
          <ScoreBadge score={r.score} />
        </div>
      ))}
    </div>
  );
}

function ShoppingListView({ shoppingList, setShoppingList, pantry }) {
  const [manualItem, setManualItem] = useState('');
  const toggleItem = (key) => setShoppingList(sl => ({ ...sl, [key]:{ ...sl[key], checked:!sl[key].checked } }));
  const removeItem = (key) => setShoppingList(sl => { const n={...sl}; delete n[key]; return n; });
  const clearChecked = () => setShoppingList(sl => { const n={}; Object.entries(sl).forEach(([k,v])=>{ if(!v.checked) n[k]=v; }); return n; });
  const addManual = () => {
    if (!manualItem.trim()) return;
    setShoppingList(sl => ({ ...sl, [manualItem.trim()]:{ checked:false, from:['manual'] } }));
    setManualItem('');
  };

  const items = Object.entries(shoppingList);
  const unchecked = items.filter(([,v])=>!v.checked);
  const checked = items.filter(([,v])=>v.checked);

  // Group by pantry category
  const grouped = useMemo(() => {
    const groups = {};
    unchecked.forEach(([k,v]) => {
      const cat = getIngCategory(k);
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push([k,v]);
    });
    return groups;
  }, [unchecked]);

  if (items.length === 0) {
    return (
      <>
        <EmptyState emoji="🛍" title="Shopping list is empty" body="Assign meals to your week plan and tap 'Generate Shopping List', or add items manually below." />
        <div style={{ display:'flex', gap:8, marginTop:16 }}>
          <input style={{ ...INPUT, flex:1 }} placeholder="Add item manually..." value={manualItem} onChange={e=>setManualItem(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addManual()} />
          <button onClick={addManual} style={{ background:C.orange, color:C.white, border:'none', borderRadius:12, padding:'0 16px', cursor:'pointer', fontWeight:900, fontSize:20, flexShrink:0 }}>+</button>
        </div>
      </>
    );
  }

  return (
    <div>
      <div style={{ display:'flex', gap:8, marginBottom:16 }}>
        <input style={{ ...INPUT, flex:1 }} placeholder="Add item..." value={manualItem} onChange={e=>setManualItem(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addManual()} />
        <button onClick={addManual} style={{ background:C.orange, color:C.white, border:'none', borderRadius:12, padding:'0 16px', cursor:'pointer', fontWeight:900, fontSize:20, flexShrink:0 }}>+</button>
      </div>

      {unchecked.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:14, fontWeight:700, color:C.brown, marginBottom:10 }}>To buy ({unchecked.length})</div>
          {Object.entries(grouped).map(([cat, catItems]) => (
            <div key={cat} style={{ background:C.white, borderRadius:14, padding:'10px 14px', marginBottom:8, boxShadow:'0 2px 6px rgba(0,0,0,0.05)' }}>
              <div style={{ fontSize:12, fontWeight:700, color:C.muted, marginBottom:8, textTransform:'uppercase', letterSpacing:0.5 }}>
                {MASTER_INGREDIENTS.find(c=>c.category===cat)?.emoji || '📦'} {cat}
              </div>
              {catItems.map(([k,v]) => (
                <div key={k} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0', borderBottom:`1px solid ${C.border}` }}>
                  <Check small checked={false} onChange={()=>toggleItem(k)} label={k} />
                  <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:6 }}>
                    {v.from && v.from.length > 0 && v.from[0] !== 'manual' && (
                      <span style={{ fontSize:10, color:C.muted, background:C.cream, borderRadius:8, padding:'2px 8px' }}>
                        {v.from.length === 1 ? v.from[0] : `${v.from.length} recipes`}
                      </span>
                    )}
                    <button onClick={()=>removeItem(k)} style={{ background:'none', border:'none', cursor:'pointer', color:C.red, fontSize:16, lineHeight:1 }}>×</button>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {checked.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <div style={{ fontSize:14, fontWeight:700, color:C.muted }}>Got it ✅ ({checked.length})</div>
            <button onClick={clearChecked} style={{ background:'none', border:`1px solid ${C.border}`, borderRadius:8, padding:'4px 12px', fontSize:12, color:C.muted, cursor:'pointer' }}>Clear done</button>
          </div>
          {checked.map(([k,v]) => (
            <div key={k} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 14px', background:C.greenLight, borderRadius:12, marginBottom:6 }}>
              <Check small checked onChange={()=>toggleItem(k)} label={k} />
              <button onClick={()=>removeItem(k)} style={{ marginLeft:'auto', background:'none', border:'none', cursor:'pointer', color:C.muted, fontSize:16, lineHeight:1 }}>×</button>
            </div>
          ))}
        </div>
      )}
      <div style={{ height:20 }} />
    </div>
  );
}

// ── FAMILY SCREEN (with Custom Recipes) ───────────────────────────────────
function FamilyScreen({ family, setFamily, customRecipes, setCustomRecipes }) {
  const [newName, setNewName] = useState('');
  const [newAge, setNewAge]   = useState('');
  const [showAddRecipe, setShowAddRecipe] = useState(false);

  const addMember = () => {
    if (!newName.trim()) return;
    setFamily(f=>({...f,members:[...(f.members||[]),{name:newName.trim(),age:newAge.trim()}]}));
    setNewName(''); setNewAge('');
  };
  const removeMember = i => setFamily(f=>({...f,members:f.members.filter((_,j)=>j!==i)}));
  const toggle = (key, val) => setFamily(f=>{ const arr=f[key]||[]; return {...f,[key]:arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]}; });
  const memberEmoji = (age) => { const n=parseInt(age); if(isNaN(n)) return '🧑'; if(n<5) return '👶'; if(n<13) return '🧒'; if(n<18) return '👦'; return '🧑'; };
  const deleteCustom = id => setCustomRecipes(r=>r.filter(x=>x.id!==id));

  return (
    <div className="screen" style={{ padding:'24px 20px' }}>
      <div style={{ fontSize:24, fontWeight:900, color:C.brown, marginBottom:4 }}>Family Setup 👨‍👩‍👧</div>
      <div style={{ fontSize:13, color:C.muted, marginBottom:22, lineHeight:1.5 }}>Personalize Luvi for your family.</div>

      <SCard>
        <STitle>🏡 Home Info</STitle>
        <div style={{ marginBottom:12 }}>
          <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Family Name</label>
          <input style={INPUT} placeholder="e.g. The Smith Family" value={family.name||''} onChange={e=>setFamily(f=>({...f,name:e.target.value}))} />
        </div>
        <div>
          <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Location (optional)</label>
          <input style={INPUT} placeholder="e.g. Austin, TX" value={family.location||''} onChange={e=>setFamily(f=>({...f,location:e.target.value}))} />
        </div>
      </SCard>

      <SCard>
        <STitle>👥 Family Members</STitle>
        {(family.members||[]).map((m,i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:10, background:C.cream, borderRadius:12, padding:'9px 13px', marginBottom:7 }}>
            <span style={{ fontSize:22 }}>{memberEmoji(m.age)}</span>
            <div style={{ flex:1 }}><div style={{ fontWeight:600, fontSize:14 }}>{m.name}</div>{m.age&&<div style={{ fontSize:12, color:C.muted }}>Age {m.age}</div>}</div>
            <button onClick={()=>removeMember(i)} style={{ background:'none', border:'none', cursor:'pointer', color:C.red, fontSize:20 }}>×</button>
          </div>
        ))}
        <div style={{ display:'flex', gap:8, marginTop:4 }}>
          <input style={{ ...INPUT, flex:2 }} placeholder="Name" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMember()} />
          <input style={{ ...INPUT, flex:1 }} placeholder="Age" type="number" min="0" value={newAge} onChange={e=>setNewAge(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMember()} />
          <button onClick={addMember} style={{ background:C.orange, color:C.white, border:'none', borderRadius:12, padding:'0 15px', cursor:'pointer', fontWeight:900, fontSize:22, flexShrink:0 }}>+</button>
        </div>
      </SCard>

      <SCard>
        <STitle>🥗 Dietary Preferences</STitle>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
          {DIETARY_OPTIONS.map(p => <Pill key={p} selected={(family.dietaryPrefs||[]).includes(p)} onClick={()=>toggle('dietaryPrefs',p)}>{p}</Pill>)}
        </div>
      </SCard>

      <SCard>
        <STitle>⚠️ Allergies</STitle>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
          {ALLERGY_OPTIONS.map(a => <Pill key={a} selected={(family.allergies||[]).includes(a)} onClick={()=>toggle('allergies',a)}>{a}</Pill>)}
        </div>
      </SCard>

      <SCard>
        <STitle>❤️ Food Preferences & Notes</STitle>
        <textarea style={{ ...INPUT, minHeight:88, resize:'vertical', lineHeight:1.5 }}
          placeholder="e.g. Kids love pasta, everyone hates mushrooms, prefer mild spices..."
          value={family.preferences||''} onChange={e=>setFamily(f=>({...f,preferences:e.target.value}))} />
      </SCard>

      {/* Custom Recipes */}
      <SCard>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <STitle>📖 My Recipes ({customRecipes.length})</STitle>
          <button onClick={()=>setShowAddRecipe(true)} style={{ background:C.orange, color:C.white, border:'none', borderRadius:10, padding:'7px 14px', cursor:'pointer', fontWeight:700, fontSize:13 }}>+ Add</button>
        </div>
        {customRecipes.length === 0 ? (
          <div style={{ textAlign:'center', padding:'16px 0', color:C.muted, fontSize:14 }}>Add your own family recipes to Luvi — they'll show up in meal suggestions just like the built-in ones.</div>
        ) : (
          customRecipes.map(r => (
            <div key={r.id} style={{ display:'flex', alignItems:'center', gap:10, background:C.cream, borderRadius:12, padding:'10px 14px', marginBottom:8 }}>
              <span style={{ fontSize:24 }}>{r.emoji}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:14 }}>{r.name}</div>
                <div style={{ fontSize:12, color:C.muted }}>{MEAL_TYPES.find(m=>m.id===r.type)?.label} · {r.time}</div>
              </div>
              <button onClick={()=>deleteCustom(r.id)} style={{ background:'none', border:'none', cursor:'pointer', color:C.red, fontSize:18 }}>×</button>
            </div>
          ))
        )}
      </SCard>

      <div style={{ background:C.greenLight, borderRadius:12, padding:14, display:'flex', gap:10, alignItems:'center', marginBottom:24 }}>
        <span style={{ fontSize:18 }}>✅</span>
        <div style={{ fontSize:13, color:'#065F46' }}>Everything saves automatically as you type!</div>
      </div>

      <BottomSheet open={showAddRecipe} onClose={()=>setShowAddRecipe(false)} title="Add Your Recipe">
        <AddRecipeForm onSave={r=>{ setCustomRecipes(c=>[...c,r]); setShowAddRecipe(false); }} />
      </BottomSheet>
    </div>
  );
}

function AddRecipeForm({ onSave }) {
  const [form, setForm] = useState({ name:'', type:'dinner', time:'30 min', base:4, desc:'', tip:'', ingsRaw:'', emoji:RECIPE_EMOJIS[0] });
  const [emojiOpen, setEmojiOpen] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSave = () => {
    if (!form.name.trim() || !form.ingsRaw.trim()) return;
    const ing = form.ingsRaw.split(',').map(s=>s.trim()).filter(Boolean);
    const recipe = { id:`custom_${Date.now()}`, name:form.name.trim(), type:form.type, time:form.time, base:parseInt(form.base)||4, desc:form.desc, tip:form.tip, ing, emoji:form.emoji, isCustom:true };
    onSave(recipe);
  };

  return (
    <div>
      <div style={{ marginBottom:12 }}>
        <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Emoji</label>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
          {RECIPE_EMOJIS.map(e => (
            <button key={e} onClick={()=>set('emoji',e)} style={{ width:38, height:38, borderRadius:10, border:`2px solid ${form.emoji===e?C.orange:C.border}`, background:form.emoji===e?C.orangeLight:C.white, fontSize:20, cursor:'pointer' }}>{e}</button>
          ))}
        </div>
      </div>
      <div style={{ marginBottom:10 }}>
        <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Recipe Name *</label>
        <input style={INPUT} placeholder="e.g. Grandma's Chicken Soup" value={form.name} onChange={e=>set('name',e.target.value)} />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
        <div>
          <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Meal Type</label>
          <select style={{ ...INPUT }} value={form.type} onChange={e=>set('type',e.target.value)}>
            {MEAL_TYPES.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
          </select>
        </div>
        <div>
          <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Cook Time</label>
          <input style={INPUT} placeholder="30 min" value={form.time} onChange={e=>set('time',e.target.value)} />
        </div>
      </div>
      <div style={{ marginBottom:10 }}>
        <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Base Servings</label>
        <input style={INPUT} type="number" min="1" placeholder="4" value={form.base} onChange={e=>set('base',e.target.value)} />
      </div>
      <div style={{ marginBottom:10 }}>
        <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Ingredients (comma-separated) *</label>
        <textarea style={{ ...INPUT, minHeight:80, resize:'vertical' }}
          placeholder="Chicken breast, Rice, Garlic, Olive oil, Salt..."
          value={form.ingsRaw} onChange={e=>set('ingsRaw',e.target.value)} />
      </div>
      <div style={{ marginBottom:10 }}>
        <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Short Description</label>
        <input style={INPUT} placeholder="A short description of this dish..." value={form.desc} onChange={e=>set('desc',e.target.value)} />
      </div>
      <div style={{ marginBottom:18 }}>
        <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>Tip (optional)</label>
        <input style={INPUT} placeholder="Your secret tip for this recipe..." value={form.tip} onChange={e=>set('tip',e.target.value)} />
      </div>
      <button onClick={handleSave} className="tap" style={{ width:'100%', padding:'14px', borderRadius:14, border:'none', cursor:'pointer', fontWeight:800, fontSize:15, background:C.orange, color:C.white, boxShadow:`0 4px 16px ${C.orange}50` }}>
        Save Recipe
      </button>
    </div>
  );
}

// ── HOUSEHOLD SETUP ───────────────────────────────────────────────────────
function HouseholdSetup({ onJoin }) {
  const [mode, setMode]   = useState(null); // 'create' | 'join'
  const [code, setCode]   = useState('');
  const [newCode, setNewCode] = useState('');
  const [copied, setCopied]   = useState(false);
  const [error, setError]     = useState('');

  const createHousehold = () => {
    const generated = Math.random().toString(36).substr(2, 6).toUpperCase();
    setNewCode(generated);
    setMode('create');
  };

  const confirmCreate = () => {
    localStorage.setItem('luvi_household', newCode);
    onJoin(newCode);
  };

  const joinHousehold = () => {
    const clean = code.trim().toUpperCase();
    if (clean.length < 4) { setError('Please enter a valid household code.'); return; }
    localStorage.setItem('luvi_household', clean);
    onJoin(clean);
  };

  const copyCode = () => {
    navigator.clipboard.writeText(newCode).catch(()=>{});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div style={{ maxWidth:480, margin:'0 auto', minHeight:'100vh', background:C.cream, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'32px 24px' }}>
      <div style={{ width:64, height:64, borderRadius:18, background:`linear-gradient(135deg,${C.orange},${C.orangeDark})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:32, boxShadow:'0 6px 24px rgba(249,115,22,0.35)', marginBottom:20 }}>🍽</div>
      <div style={{ fontSize:32, fontWeight:900, color:C.orange, letterSpacing:-1, marginBottom:6 }}>Luvi</div>
      <div style={{ fontSize:15, color:C.muted, marginBottom:36, textAlign:'center', lineHeight:1.6 }}>Family meal prep, made easy.<br/>Set up your household to get started.</div>

      {!mode && (
        <div style={{ width:'100%' }}>
          <button className="tap" onClick={createHousehold} style={{ width:'100%', padding:'18px 24px', borderRadius:18, border:'none', cursor:'pointer', background:`linear-gradient(135deg,${C.orange},${C.orangeDark})`, color:C.white, fontWeight:800, fontSize:17, marginBottom:14, boxShadow:'0 6px 20px rgba(249,115,22,0.35)' }}>
            🏠 Create a new household
          </button>
          <button className="tap" onClick={()=>setMode('join')} style={{ width:'100%', padding:'18px 24px', borderRadius:18, border:`2px solid ${C.border}`, cursor:'pointer', background:C.white, color:C.brown, fontWeight:700, fontSize:17 }}>
            🔗 Join an existing household
          </button>
        </div>
      )}

      {mode === 'create' && (
        <div className="screen" style={{ width:'100%' }}>
          <div style={{ background:C.white, borderRadius:20, padding:24, boxShadow:'0 4px 20px rgba(0,0,0,0.08)', marginBottom:16, textAlign:'center' }}>
            <div style={{ fontSize:14, color:C.muted, marginBottom:12 }}>Your household code</div>
            <div style={{ fontSize:42, fontWeight:900, color:C.orange, letterSpacing:6, marginBottom:16 }}>{newCode}</div>
            <button onClick={copyCode} style={{ background:copied?C.greenLight:C.orangeLight, border:'none', borderRadius:12, padding:'10px 22px', cursor:'pointer', fontWeight:700, fontSize:14, color:copied?'#065F46':C.orangeDark, transition:'all 0.2s' }}>
              {copied ? '✅ Copied!' : '📋 Copy code'}
            </button>
          </div>
          <div style={{ background:C.amberLight, borderRadius:14, padding:14, marginBottom:20, display:'flex', gap:10 }}>
            <span style={{ fontSize:18 }}>💡</span>
            <div style={{ fontSize:13, color:'#92400E', lineHeight:1.5 }}>Share this code with your partner — they'll use it to join your household and see the same pantry, meal plan, and shopping list.</div>
          </div>
          <button className="tap" onClick={confirmCreate} style={{ width:'100%', padding:'16px', borderRadius:16, border:'none', cursor:'pointer', background:C.green, color:C.white, fontWeight:800, fontSize:16, boxShadow:`0 4px 16px ${C.green}50` }}>
            Let's go! →
          </button>
          <button onClick={()=>setMode(null)} style={{ width:'100%', marginTop:12, background:'none', border:'none', cursor:'pointer', color:C.muted, fontSize:14, padding:'8px' }}>← Back</button>
        </div>
      )}

      {mode === 'join' && (
        <div className="screen" style={{ width:'100%' }}>
          <div style={{ fontSize:15, fontWeight:700, color:C.brown, marginBottom:10 }}>Enter your household code</div>
          <input
            style={{ ...INPUT, fontSize:22, fontWeight:800, letterSpacing:4, textAlign:'center', textTransform:'uppercase', marginBottom:8 }}
            placeholder="e.g. AB12CD"
            maxLength={8}
            value={code}
            onChange={e=>{ setCode(e.target.value); setError(''); }}
            onKeyDown={e=>e.key==='Enter'&&joinHousehold()}
          />
          {error && <div style={{ fontSize:13, color:C.red, marginBottom:8 }}>{error}</div>}
          <div style={{ fontSize:13, color:C.muted, marginBottom:20, lineHeight:1.5 }}>Ask whoever created the household to share their 6-character code with you.</div>
          <button className="tap" onClick={joinHousehold} style={{ width:'100%', padding:'16px', borderRadius:16, border:'none', cursor:'pointer', background:C.orange, color:C.white, fontWeight:800, fontSize:16, boxShadow:`0 4px 16px ${C.orange}50` }}>
            Join household →
          </button>
          <button onClick={()=>setMode(null)} style={{ width:'100%', marginTop:12, background:'none', border:'none', cursor:'pointer', color:C.muted, fontSize:14, padding:'8px' }}>← Back</button>
        </div>
      )}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState('home');
  const [kidsMode, setKidsMode] = useState(false);
  const [selectedRecipe, setSelectedRecipe]   = useState(null);
  const [selectedServings, setSelectedServings] = useState(4);

  // Household / sync state
  const [householdId, setHouseholdId] = useState(() => localStorage.getItem('luvi_household') || null);
  const [loaded, setLoaded]           = useState(false);
  const syncingFromRemote             = useRef(false);

  // App data — starts empty, populated from Firestore
  const [family,            setFamily]            = useState({});
  const [pantry,            setPantry]            = useState({});
  const [mealPlan,          setMealPlan]          = useState({});
  const [shoppingList,      setShoppingList]      = useState({});
  const [customRecipes,     setCustomRecipes]     = useState([]);
  const [customPantryItems, setCustomPantryItems] = useState({});

  // ── Subscribe to Firestore ────────────────────────────────────────────
  useEffect(() => {
    if (!householdId) return;
    const docRef = db.collection('households').doc(householdId);
    const unsub = docRef.onSnapshot(snap => {
      syncingFromRemote.current = true;
      if (!snap.exists) {
        // Brand new household — seed empty document
        docRef.set({ family:{}, pantry:{}, mealPlan:{}, shoppingList:{}, customRecipes:[], customPantryItems:{} });
      } else {
        const d = snap.data();
        if (d.family            !== undefined) setFamily(d.family);
        if (d.pantry            !== undefined) setPantry(d.pantry);
        if (d.mealPlan          !== undefined) setMealPlan(d.mealPlan);
        if (d.shoppingList      !== undefined) setShoppingList(d.shoppingList);
        if (d.customRecipes     !== undefined) setCustomRecipes(d.customRecipes);
        if (d.customPantryItems !== undefined) setCustomPantryItems(d.customPantryItems);
      }
      setLoaded(true);
      requestAnimationFrame(() => { syncingFromRemote.current = false; });
    }, err => {
      console.error('Firestore error:', err);
      setLoaded(true); // still show app even if offline
    });
    return () => unsub();
  }, [householdId]);

  // ── Write to Firestore on every change ───────────────────────────────
  const write = useCallback((data) => {
    if (!householdId || syncingFromRemote.current) return;
    db.collection('households').doc(householdId).set(data, { merge: true }).catch(console.error);
  }, [householdId]);

  useEffect(() => { write({ family });            }, [family]);
  useEffect(() => { write({ pantry });            }, [pantry]);
  useEffect(() => { write({ mealPlan });          }, [mealPlan]);
  useEffect(() => { write({ shoppingList });      }, [shoppingList]);
  useEffect(() => { write({ customRecipes });     }, [customRecipes]);
  useEffect(() => { write({ customPantryItems }); }, [customPantryItems]);

  // ── Household not set up yet ──────────────────────────────────────────
  if (!householdId) {
    return <HouseholdSetup onJoin={id => { setHouseholdId(id); setLoaded(false); }} />;
  }

  // ── Loading spinner while first Firestore snapshot arrives ────────────
  if (!loaded) {
    return (
      <div style={{ maxWidth:480, margin:'0 auto', minHeight:'100vh', background:C.cream, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16 }}>
        <div style={{ width:56, height:56, borderRadius:16, background:`linear-gradient(135deg,${C.orange},${C.orangeDark})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:26 }}>🍽</div>
        <div style={{ fontSize:22, fontWeight:900, color:C.orange }}>Luvi</div>
        <div style={{ fontSize:14, color:C.muted }}>Syncing your household…</div>
      </div>
    );
  }

  const allRecipes = useMemo(() => [...RECIPES, ...customRecipes], [customRecipes]);

  const checkedCount    = Object.values(pantry).filter(Boolean).length;
  const shoppingCount   = Object.keys(shoppingList).filter(k=>!shoppingList[k].checked).length;

  const handleTabChange = (t) => { setTab(t); setSelectedRecipe(null); };

  const NAV = [
    { id:'home',    emoji:'🏠', label:'Home' },
    { id:'pantry',  emoji:'🛒', label:'Pantry',   badge: checkedCount > 0 ? checkedCount : null },
    { id:'finder',  emoji:'🔍', label:'Find' },
    { id:'plan',    emoji:'📅', label:'Plan',      badge: shoppingCount > 0 ? shoppingCount : null },
    { id:'family',  emoji:'👨‍👩‍👧', label:'Family' },
  ];

  const renderScreen = () => {
    if (kidsMode) return <KidsScreen pantry={pantry} allRecipes={allRecipes} />;
    if (selectedRecipe) return <RecipeDetail recipe={selectedRecipe} servings={selectedServings} pantry={pantry} onBack={()=>setSelectedRecipe(null)} shoppingList={shoppingList} setShoppingList={setShoppingList} />;
    switch(tab) {
      case 'home':   return <HomeScreen family={family} pantry={pantry} allRecipes={allRecipes} setTab={handleTabChange} kidsMode={kidsMode} setKidsMode={setKidsMode} />;
      case 'pantry': return <PantryScreen pantry={pantry} setPantry={setPantry} customPantryItems={customPantryItems} setCustomPantryItems={setCustomPantryItems} />;
      case 'finder': return <FinderScreen pantry={pantry} family={family} allRecipes={allRecipes} onSelectRecipe={(r,s)=>{setSelectedRecipe(r);setSelectedServings(s);}} shoppingList={shoppingList} setShoppingList={setShoppingList} />;
      case 'plan':   return <PlanScreen mealPlan={mealPlan} setMealPlan={setMealPlan} pantry={pantry} family={family} allRecipes={allRecipes} shoppingList={shoppingList} setShoppingList={setShoppingList} />;
      case 'family': return <FamilyScreen family={family} setFamily={setFamily} customRecipes={customRecipes} setCustomRecipes={setCustomRecipes} />;
    }
  };

  return (
    <div style={{ maxWidth:480, margin:'0 auto', minHeight:'100vh', background:kidsMode?'linear-gradient(160deg,#FFF0E0,#FFF7ED,#E8F5E9)':C.cream, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ background:kidsMode?'white':C.white, padding:'13px 18px', position:'sticky', top:0, zIndex:30, boxShadow:'0 2px 10px rgba(0,0,0,0.07)', display:'flex', alignItems:'center', gap:11 }}>
        <button onClick={()=>{ handleTabChange('home'); setKidsMode(false); }} style={{ display:'flex', alignItems:'center', gap:11, background:'none', border:'none', cursor:'pointer', padding:0, flexShrink:0 }}>
          <div style={{ width:38, height:38, borderRadius:12, background:`linear-gradient(135deg,${C.orange},${C.orangeDark})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, boxShadow:'0 3px 10px rgba(249,115,22,0.35)', flexShrink:0 }}>🍽</div>
          <div style={{ textAlign:'left' }}>
            <div style={{ fontWeight:900, fontSize:21, color:C.orange, letterSpacing:-0.5, lineHeight:1 }}>{kidsMode ? '🧒 Kids Mode' : 'Luvi'}</div>
            <div style={{ fontSize:10, color:C.muted, lineHeight:1 }}>{kidsMode ? 'What do you want to eat?' : 'Family Meal Prep'}</div>
          </div>
        </button>
        {!kidsMode && (
          <div style={{ marginLeft:'auto', textAlign:'right' }}>
            {family.name && <div style={{ fontSize:12, color:C.muted, fontStyle:'italic' }}>{family.name}</div>}
            <div style={{ fontSize:10, color:C.border, letterSpacing:1, fontWeight:700 }}>#{householdId}</div>
          </div>
        )}
        {kidsMode && <button onClick={()=>setKidsMode(false)} style={{ marginLeft:'auto', background:C.orangeLight, border:'none', borderRadius:10, padding:'6px 14px', cursor:'pointer', fontWeight:700, fontSize:12, color:C.orangeDark }}>Exit ×</button>}
      </div>

      {/* Screen */}
      <div style={{ flex:1, overflowY:'auto', paddingBottom:kidsMode?24:80 }}>
        {renderScreen()}
      </div>

      {/* Bottom nav (hidden in kids mode) */}
      {!kidsMode && (
        <div style={{ position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:480, background:C.white, zIndex:20, borderTop:`1px solid ${C.border}`, boxShadow:'0 -4px 20px rgba(0,0,0,0.09)', display:'flex' }}>
          {NAV.map(n => {
            const active = !selectedRecipe && tab === n.id;
            return (
              <button key={n.id} onClick={()=>handleTabChange(n.id)} style={{ flex:1, padding:'9px 4px 7px', background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:2, position:'relative' }}>
                <span style={{ fontSize:20, position:'relative' }}>
                  {n.emoji}
                  {n.badge && (
                    <span style={{ position:'absolute', top:-4, right:-8, background:n.id==='plan'?C.blue:C.orange, color:C.white, borderRadius:10, fontSize:9, fontWeight:900, padding:'1px 5px', lineHeight:1.4 }}>{n.badge > 99 ? '99+' : n.badge}</span>
                  )}
                </span>
                <span style={{ fontSize:9, fontWeight:active?700:400, color:active?C.orange:C.muted }}>{n.label}</span>
                {active && <div style={{ position:'absolute', bottom:0, width:28, height:3, background:C.orange, borderRadius:'3px 3px 0 0' }} />}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

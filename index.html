function HomeScreen({ family, pantry, setTab, kidsMode, setKidsMode }) {
  const checked = Object.values(pantry).filter(Boolean).length;

// Safer render
setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
}, 100);

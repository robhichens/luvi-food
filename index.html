<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luvi – Family Meal Prep</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #FAF6F0; color: #3F2A1E; margin:0; }
    .screen { padding: 28px 20px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .hero { background: linear-gradient(135deg, #84A98C, #5E7A66); color: white; border-radius: 28px; padding: 32px 24px; margin-bottom: 28px; box-shadow: 0 8px 32px rgba(132,169,140,0.25); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const firebaseConfig = {
  apiKey: "AIzaSyCzWmaWMgjdMiNyVp3nca25tZDzuVXXFzE",
  authDomain: "luvi-meals.firebaseapp.com",
  projectId: "luvi-meals",
  storageBucket: "luvi-meals.firebasestorage.app",
  messagingSenderId: "268757552783",
  appId: "1:268757552783:web:3522c10a0432d24e226afa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const C = {
  cream: '#FAF6F0',
  surface: '#FFFFFF',
  text: '#3F2A1E',
  muted: '#8C7A6B',
  border: '#E8D9C8',
  sage: '#84A98C',
  sageDark: '#5E7A66',
};

function App() {
  const [householdId] = useState(() => {
    let id = localStorage.getItem('luvi_household');
    if (!id) {
      id = Math.random().toString(36).substr(2,6).toUpperCase();
      localStorage.setItem('luvi_household', id);
    }
    return id;
  });

  return (
    <div style={{ maxWidth: '480px', margin: '0 auto', minHeight: '100vh', background: C.cream }}>
      <div style={{ padding: '16px 20px', background: '#fff', boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
        <div style={{ fontSize: 26, fontWeight: 800, color: C.sage }}>Luvi</div>
      </div>
      <div className="screen">
        <div className="hero">
          <div style={{ fontSize: 14, opacity: 0.9 }}>Good afternoon 👋</div>
          <div style={{ fontSize: 28, fontWeight: 800, margin: '10px 0' }}>What's for dinner?</div>
          <div style={{ opacity: 0.92 }}>Warm, elegant family meal ideas from your pantry.</div>
        </div>

        <div style={{ background: C.surface, borderRadius: 24, padding: 24, boxShadow: '0 4px 20px rgba(0,0,0,0.06)', marginBottom: 20 }}>
          <div style={{ fontWeight: 700, marginBottom: 8 }}>Household ID: <span style={{ color: C.sage }}>{householdId}</span></div>
          <div style={{ fontSize: 14, color: C.muted }}>The app is now running with the new Montecito-inspired branding.</div>
        </div>

        <button style={{ width: '100%', padding: '16px', background: C.sage, color: 'white', border: 'none', borderRadius: 20, fontWeight: 700, fontSize: 16 }}>
          Start Adding Pantry Items →
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
